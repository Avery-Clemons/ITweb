<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .array-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .element {
            background: #e0f7fa;
            padding: 10px 20px;
            border: 2px solid #006064;
            border-radius: 5px;
            font-weight: bold;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        .log {
            background: #7daed6;
            padding: 10px;
            margin-top: 20px;
            border-left: 5px solid #333;
        }
    </style>
</head>

<body>
    <h1>Javascript Array Methods</h1>
    <h3>Current 'RSVP for Happy Hour'</h3>
    
    <div id="visualArray" class="array-container"></div>
    <div id="outputString"></div>

    <hr>
 <!-- ["Luffy", "Zoro", "Nami", "Robin", "Chopper"] -->

<!-- friends.push("Loki") -->
    <button onclick="demoPush()">Push (Add to End)</button>
    <!-- ["Luffy", "Zoro", "Nami", "Robin", "Chopper", "Loki"] -->

    <!-- friends.pop() -->
    <button onclick="demoPop()">Pop (Remove Last)</button>
    <!-- ["Luffy", "Zoro", "Nami", "Robin", "Chopper"] -->

    <!-- friends.unshift("Alex") -->
    <button onclick="demoUnshift()">Unshift (Add to Start)</button>
    <!-- var friends_for_happy_hour = ["Luffy", "Zoro, "Nami", "Robin", "Chopper" -->

    
    <button onclick="demoPush()">Push (Add to End)</button>
     <!-- ["Alex","Luffy","Zoro", "Nami", "Robin", "Chopper"] -->

    <!-- friends.shift() -->
    <button onclick="demoShift()">Shift (Remove first)</button>
    <!-- ["Zoro", "Nami", "Robin", "Chopper"] -->
    <!-- friends.slice() -->
    <button onclick="demoSlice()">Slice (Insert at 3)</button>

    <!-- friends.sort() -->
    <button onclick="demoSort()">Sort (A-Z)</button>
    <!-- ["Nami", "Luffy", "Chopper", "Zoro", "Robin"] -->

    <!-- friends.reverse() -->
    <button onclick="demoReverse()">Reverse (Z-A)</button>
    <!-- ["Chopper", "Robin", "Nami", "Zoro", "Luffy"] -->

    <div class="log" id="actionlog">Action Log: Lets Go!!!</div>

    <script>
         var friends_for_happy_hour = ["Luffy", "Zoro", "Nami", "Robin", "Chopper","Sanji", "Franky"];
        // Human:                Person  1       2       3          4       5
        // Computers:                    0       1       2          3       4

        function updateDisplayToday(action_for_happy_hour) {
            const container = document.getElementById("visualArray");
            container.innerHTML = "";

            // This loops through our friends_for_happy_hour array.
            /*
                1. For every person in the list, it runs the code inside curly brackets.
                2. It gives us the friends_for_happy_hour's name (friends) and their position in the list (index).
            */
            friends_for_happy_hour.forEach((friends, index) => {
               
               /* This creates a brand new, empty element in our computer's memory.
               It is not visible our screen.
               */
                let div_today = document.createElement("div");

                // This assigns the CSS class "element" to the new div, so that we can style it later
                // <div class="element"></div>
                div_today.className = 'element';

                // This fills our div with the text
                // If the first friend is Andy, then it will set the text to "0: Luffy"
                div_today.innerText = `${index}: ${friends}`;

                // This is our final Touch
                // 1. It will Take that new div
                // 2. It will stick inside an existing element on our page (the container)
                // 3. It will be visible on the screen
                // Refer to: https://www.youtube.com/watch?v=e0iEHxd6vI
                container.appendChild(div_today);

                document.getElementById('outputString').innerText = `Friends Coming for Happy Hour: [${friends_for_happy_hour.join(", 😎")}]`;

                document.getElementById('actionlog').innerText = `Action: ${action_for_happy_hour}`

                document.getElementById('actionlog').innerText +=`, Array Length: ${friends_for_happy_hour.length}`
          });
        }
        updateDisplayToday("Page Loaded")

        function demoPush(){
            friends_for_happy_hour.push("Vivi");
            updateDisplayToday("push ('Vivi')");
            // 1. friend_not_coming will first store Franky who is getting removed from our list
                // a. It will show pop () -> Franky

            // 2. If we click again push() button again, then
                // a. friend_not_coming will be updated
               // b. friend_not_coming will "Sanji" (which is the last element)
               // c. It will show pop () -> Sanji
        }

        function demoPop(){
          friend_not_coming_ = friends_for_happy_hour.pop();
            updateDisplayToday(`pop () -> ${friend_not_coming_} is not coming for happy hour`);
        }

        function demoUnshift(){
            friends_for_happy_hour.unshift("Ace");
            updateDisplayToday("unshift ('Ace')");
        }

        function demoShift(){
            friend_not_coming_priority = friends_for_happy_hour.shift();
            updateDisplayToday(`shift () -> Removed ${friend_not_coming_priority} from the list`);
        }

        function demoSort(){
            friends_for_happy_hour.sort();
            updateDisplayToday("sort ()");
        }

        function demoReverse(){
            friends_for_happy_hour.reverse();
            updateDisplayToday("reverse ()");
        }
    </script>


</body>
