<!DOCTYPE html>
<html>

<head>
    <title>Student Registration</title>
</head>

<body>
    <h2>Registration Form</h2>

    <form action="success..html" method="get" target="_blank">
        <label for="firstname">First Name:</label>
        <br>
        <input type="text" id="firstname" placeholder="Enter First Name">
        <br>
        <br>
        <br>
        <label for="lastname">Last Name:</label>
        <br>
        <input type="text" id="lastname" placeholder="Enter Last Name">
        <br>
        <br>
        <br>
        <fieldset>
            <legend>Gender</legend>
            <input type="radio" id="male" name="gender" vaule="male">
            <label for="male">Male</label>
            <br>

            <input type="radio" id="female" name="gender" vaule="female">
            <label"female">Female</label>
            <br>

              <input type="radio" id="other" name="gender" vaule="other">
            <label for="other">Other</label>
             </fieldset>
  
            <br>
         <label for="email"> Email Adress:</label>
         <input type="email" id="email" name="email" placeholder="abc@gmail.com">
         </fieldset>
        
         <br>
         <br>

        <label for="password">Password:</label>
         <input type="text" id="password" name="password" maxlength="12" placeholder="password should be 12 digts">
         </fieldset>

         <br>
         <br>

         <label for="birthday">Birthday:</label>
         <br>
         <input type="date" id="birthday" name="brithday">
         </fieldset>
         <br>
         <br>

         <input type="checkbox" id="terms" name="terms">
         <label for="terms">I agree to terms and conditons</label>

         <br><br>
         <button type="submit">Register</button>

    </form>
</body>

</html>
